services:
  - type: web
    name: hustlebank-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "8080"
      - key: GIN_MODE
        value: release
